<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤫</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Cormorant+Garamond:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="petals"></div>

<!-- PASSWORD SCREEN -->
<div id="lockScreen">
  <div class="lockCard">
    <h1>💖 Enter Password</h1>
    <p>This little world was made just for you.</p>

    <input type="password" id="passwordInput" placeholder="Password">
    <button class="primaryBtn" id="unlockBtn">Unlock</button>

    <div class="error" id="passwordError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <div class="controls">
    <button class="secondaryBtn" id="modeBtn">🌙 Dark Mode</button>
    <button class="secondaryBtn" id="resetBtn">🔁 Reset</button>
  </div>

  <section class="hero">
    <h1>🌸 reasons ......🤔?</h1>
    <p>Open each letter slowly.</p>

    <div class="progressWrapper">
      <div class="progressBar">
        <div class="progressFill" id="progressFill"></div>
      </div>
      <div class="progressText">
        Opened <span id="count">0</span>/100
      </div>
    </div>
  </section>

  <section class="gardenSection">
    <h2 class="gardenTitle">🌸 Memory Garden</h2>
    <div id="garden"></div>
  </section>

  <div class="container" id="letters"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="paper">
    <h2 id="letterTitle"></h2>
    <div id="letterText"></div>

    <div class="modalButtons">
      <button class="secondaryBtn" id="prevBtn">⬅ Prev</button>
      <button class="secondaryBtn" id="nextBtn">Next ➡</button>
      <button class="primaryBtn" id="closeBtn">Close</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
